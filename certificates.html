<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>The Vault - Training Dashboard</title>
  <link rel="icon" type="image/jpeg" href="assets/Simple_Logo-removebg-preview.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Playfair+Display:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script data-memberstack-app="app_cmnbvd53800750syd4jief980" src="https://static.memberstack.com/scripts/v2/memberstack.js" type="text/javascript"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#1e3a5f',
            foreground: '#1a1a2e',
            muted: '#6b7280',
            border: '#e5e7eb',
            'dark-bg': '#0a0a14',
            'dark-card': '#12121f'
          },
          fontFamily: {
            sans: ['Inter', 'system-ui', 'sans-serif'],
            serif: ['Playfair Display', 'Georgia', 'serif']
          }
        }
      }
    }
  </script>
  
  <style>
    /* Custom scrollbar */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #f1f1f1;
    }
    ::-webkit-scrollbar-thumb {
      background: #d1d5db;
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #9ca3af;
    }

    #sidebar,
    #mainContent {
      transition: all 0.3s ease;
    }

    #sidebar.collapsed {
      width: 5rem;
    }

    #sidebar.collapsed #categoryFilters,
    #sidebar.collapsed #sidebarSpacer {
      display: none;
    }

    #sidebar.collapsed .vault-title {
      display: none;
    }

    #sidebar.collapsed .vault-logo-row {
      justify-content: center;
    }

    #sidebar.collapsed .vault-logo-icon {
      width: 3rem;
      height: 3rem;
      margin-right: 0;
    }

    .vault-logo-icon {
      transform: translateY(2px);
    }

    #sidebar.collapsed nav {
      padding-left: 0.5rem;
      padding-right: 0.5rem;
    }

    #sidebar.collapsed nav a {
      justify-content: center;
      padding-left: 0.75rem;
      padding-right: 0.75rem;
    }

    #sidebar.collapsed .nav-label {
      display: none;
    }
  </style>
</head>
<body class="font-sans bg-gray-50 text-foreground antialiased">
  <div class="flex min-h-screen">
    
    <!-- Left Sidebar -->
    <aside id="sidebar" class="w-64 bg-slate-50 flex flex-col fixed h-full overflow-hidden rounded-tr-xl rounded-br-xl">
      <div id="sidebarContent" class="flex flex-col h-full">
      <!-- Logo -->
      <div id="sidebarLogo" class="h-20 px-6 flex items-center">
        <div class="vault-logo-row flex items-center justify-center">
          <svg class="vault-logo-icon h-11 w-11 text-black mr-3" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <rect x="3" y="4" width="18" height="16" rx="2" ry="2" stroke-linecap="round" stroke-linejoin="round"/>
            <circle cx="12" cy="12" r="3" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M12 9v1m0 4v1m3-3h-1m-4 0H9" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M6 8v8" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          <h1 class="vault-title font-serif text-3xl font-semibold text-black tracking-tight">The Vault</h1>
        </div>
      </div>
      
      <!-- Main Navigation -->
      <nav class="p-4 space-y-1">
        <a href="#" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-lg bg-black/5 text-black font-medium transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M14.752 11.168l-3.197-2.132A1 1 0 0010 9.87v4.263a1 1 0 001.555.832l3.197-2.132a1 1 0 000-1.664z"/>
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>
          </svg>
          <span class="nav-label">Video Library</span>
        </a>
        <a href="#" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z"/>
          </svg>
          <span class="nav-label">My Certificates</span>
        </a>
        <a href="#" class="sidebar-nav-btn flex items-center gap-3 px-4 py-3 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M18.364 5.636l-3.536 3.536m0 5.656l3.536 3.536M9.172 9.172L5.636 5.636m3.536 9.192l-3.536 3.536M21 12a9 9 0 11-18 0 9 9 0 0118 0zm-5 0a4 4 0 11-8 0 4 4 0 018 0z"/>
          </svg>
          <span class="nav-label">Support</span>
        </a>
      </nav>
      
      <!-- Category Filters -->
      <div id="categoryFilters" class="p-4 mt-4">
        <h3 class="px-4 text-xs font-semibold text-muted uppercase tracking-wider mb-3">Industries / Topics</h3>
        <div class="space-y-1">
          <button class="sidebar-filter-btn w-full text-left px-4 py-2 rounded-lg text-black font-medium bg-black/5 transition-colors" type="button">
            All
          </button>
          <button class="sidebar-filter-btn w-full text-left px-4 py-2 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors" type="button">
            General Safety
          </button>
          <button class="sidebar-filter-btn w-full text-left px-4 py-2 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors" type="button">
            Power Tools
          </button>
          <button class="sidebar-filter-btn w-full text-left px-4 py-2 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors" type="button">
            Heavy Machinery
          </button>
          <button class="sidebar-filter-btn w-full text-left px-4 py-2 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors" type="button">
            Agriculture
          </button>
          <button class="sidebar-filter-btn w-full text-left px-4 py-2 rounded-lg text-muted hover:bg-black/5 hover:text-black transition-colors" type="button">
            Working at Heights
          </button>
        </div>
      </div>
      
      <!-- Spacer -->
      <div id="sidebarSpacer" class="flex-1"></div>
      
      </div>

      <div class="p-3 border-t border-border mt-auto">
        <button
          id="sidebarToggle"
          type="button"
          aria-expanded="true"
          aria-label="Collapse sidebar"
          class="w-full rounded-lg border border-border py-2 text-sm font-semibold text-foreground hover:bg-gray-50 transition-colors"
        >
          &lt;&lt;
        </button>
      </div>

      <p class="pb-2 text-[10px] text-muted text-center">&copy; 2026 Solutions Inc.</p>
    </aside>
    
    <!-- Main Content Area -->
    <main id="mainContent" class="flex-1 ml-64 bg-white">
      
      <!-- Top Navbar -->
      <header class="bg-slate-50 sticky top-0 z-10">
        <div class="h-20 flex items-center justify-between px-8">
          <!-- Search Bar -->
          <div class="flex-1 max-w-2xl">
            <div class="relative">
              <svg class="absolute left-4 top-1/2 -translate-y-1/2 w-5 h-5 text-muted" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
              </svg>
              <input 
                type="text" 
                placeholder="Search for training, tools, or hazards..." 
                class="w-full pl-12 pr-4 py-3 bg-gray-50 border border-border rounded-xl text-sm placeholder:text-muted focus:outline-none focus:ring-2 focus:ring-primary/20 focus:border-primary transition-all"
              >
            </div>
          </div>
          
          <!-- Right Side Actions -->
          <div class="flex items-center gap-4 ml-8">
            <!-- Notifications -->
            <button class="relative p-2 text-muted hover:text-foreground transition-colors">
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full"></span>
            </button>
            
            <!-- User Profile -->
            <button data-ms-modal="profile" class="shrink-0 flex items-center gap-3 pl-4 border-l border-border hover:opacity-80 transition-opacity text-left">
              <div class="text-right hidden sm:block">
                <p class="text-sm font-medium text-foreground"><span data-ms-member="first-name">Client</span> <span data-ms-member="last-name">Name</span></p>
                <p class="text-xs text-muted">Safety Manager</p>
              </div>
              <div class="flex h-10 w-10 items-center justify-center rounded-full bg-primary text-sm font-medium text-white">
                SJ
              </div>
            </button>
          </div>
        </div>
      </header>

  <script>
    const sidebar = document.getElementById('sidebar');
    const sidebarToggle = document.getElementById('sidebarToggle');
    const mainContent = document.getElementById('mainContent');
    const sidebarNavButtons = document.querySelectorAll('.sidebar-nav-btn');
    const sidebarFilterButtons = document.querySelectorAll('.sidebar-filter-btn');

    const setActiveSidebarButton = (buttons, activeButton) => {
      buttons.forEach((button) => {
        button.classList.remove('bg-black/5', 'text-black', 'font-medium');
        button.classList.add('text-muted');
      });

      activeButton.classList.add('bg-black/5', 'text-black', 'font-medium');
      activeButton.classList.remove('text-muted');
    };

    sidebarNavButtons.forEach((button) => {
      button.addEventListener('click', (event) => {
        event.preventDefault();
        setActiveSidebarButton(sidebarNavButtons, button);
      });
    });

    sidebarFilterButtons.forEach((button) => {
      button.addEventListener('click', () => {
        setActiveSidebarButton(sidebarFilterButtons, button);
      });
    });

    sidebarToggle.addEventListener('click', () => {
      const isCollapsed = sidebar.classList.toggle('collapsed');

      mainContent.style.marginLeft = isCollapsed ? '5rem' : '16rem';
      sidebarToggle.textContent = isCollapsed ? '>>' : '<<';
      sidebarToggle.setAttribute('aria-expanded', String(!isCollapsed));
      sidebarToggle.setAttribute('aria-label', isCollapsed ? 'Expand sidebar' : 'Collapse sidebar');
    });
  </script>
</body>
</html>
